<style>
  .hero-wrap{
    position:relative;
    overflow:hidden;
  }

  .hero-overlay{
    background:
      linear-gradient(to bottom right, rgba(7,10,25,.82), rgba(18,24,52,.75)),
      linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.25));
  }

  .glass-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 40px rgba(0,0,0,.35);
  }

  .tab-btn.active{
    background:#fff;
    color:#111827;
    box-shadow:0 4px 18px rgba(255,255,255,.2);
  }

  .search-box{
    background:#fff;
    border:1px solid #e5e7eb;
    transition:.3s ease;
  }

  .search-box:focus-within{
    border-color:#d4af37;
    box-shadow:0 0 0 4px rgba(212,175,55,.12);
  }

  .search-btn{
    background:#111827;
    transition:.3s ease;
  }

  .search-btn:hover{
    background:#000;
  }

  .stat-card{
    background:rgba(255,255,255,.07);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
  }

  @media(max-width:640px){

    .hero-heading{
      font-size:2rem;
      line-height:2.5rem;
    }

    .search-btn{
      width:100%;
      justify-content:center;
    }

  }
</style>

<!-- MAIN SECTION -->
<section class="hero-wrap relative min-h-[78vh] flex items-center justify-center px-4 py-8 md:py-10">

  <!-- BG -->
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80" class="w-full h-full object-cover" alt="Background Image">
    <div class="hero-overlay absolute inset-0"></div>
  </div>

  <!-- CONTENT -->
  <div class="relative z-10 w-full max-w-5xl">

    <!-- TOP -->
    <div class="text-center mb-6">

      <span class="inline-block text-[10px] md:text-xs tracking-[3px] uppercase text-yellow-400 font-semibold mb-3">
        Luxury Living Starts Here
      </span>

      <h1 class="hero-heading text-white text-3xl md:text-5xl font-black leading-tight max-w-3xl mx-auto">
        Find Your Perfect
        <span class="text-yellow-400">
          Dream Property
        </span>
      </h1>

      <p class="text-gray-300 text-xs md:text-sm max-w-xl mx-auto mt-3 leading-6">
        Verified homes, premium projects and seamless property discovery.
      </p>

    </div>

    <!-- SEARCH CARD -->
    <div class="glass-card rounded-md p-3 md:p-4 max-w-4xl mx-auto">

    <!-- TOP BAR -->
    <div class="relative flex items-center justify-center mb-4">

      <!-- CENTER TABS -->
      <div class="bg-white/10 p-1 rounded-lg flex gap-2">

        <button onclick="switchTab('buy',this)" class="tab-btn active px-5 py-2 rounded-lg text-xs font-semibold transition-all duration-300">
          Buy
        </button>

        <button  onclick="switchTab('rent',this)" class="tab-btn text-white px-5 py-2 rounded-lg text-xs font-semibold transition-all duration-300">
          Rent
        </button>

      </div>

    </div>

      <!-- BUY FORM -->
      <form id="buyForm"  action="{% url 'search_projects' %}"  method="GET"  class="grid grid-cols-1 md:grid-cols-3 gap-2">

        <!-- LOCATION -->
        <div class="bg-white rounded-md px-4 py-3 md:col-span-2 border border-white/10">

          <label class="text-[14px] text-gray-500 font-semibold block mb-1">
            Location
          </label>

          <div class="flex items-center gap-2">

            <i class="fa-solid fa-location-dot text-gray-400 text-sm"></i>

            <input type="text"  name="q"  placeholder="Search Locality , City or Projects" class="w-full bg-transparent outline-none text-sm text-gray-700 placeholder:text-gray-400">

          </div>

        </div>

        <!-- SEARCH BUTTON -->
        <div class="flex items-stretch">

          <button type="submit" class="w-full rounded-md bg-[#08142b] hover:bg-[#0b1d3d] text-white flex items-center justify-center gap-2 px-1 py-3 text-sm font-semibold transition-all duration-300 border border-white/10">
            <i class="fa-solid fa-magnifying-glass text-sm"></i>
            Search Property
          </button>

        </div>

     

      </form>

      <!-- RENT FORM -->
      <form id="rentForm" action="{% url 'rent_list' %}" method="GET" class="hidden grid-cols-1 md:grid-cols-3 gap-3">

        <!-- LOCATION -->
        <div class="search-box rounded-md px-4 py-2.5 md:col-span-2">

          <label class="text-[11px] text-gray-500 font-medium block mb-1">
            Rental Area
          </label>

          <div class="flex items-center gap-2">

            <i class="fa-solid fa-house text-gray-400 text-sm"></i>

            <input type="text" name="q" placeholder="Search flats or PG" class="w-full outline-none text-sm text-gray-700">

          </div>

        </div>

  
        <!-- SEARCH BUTTON -->
        <div class="flex items-stretch">

          <button type="submit" class="w-full rounded-md bg-[#08142b] hover:bg-[#0b1d3d] text-white flex items-center justify-center gap-2 px-1 py-3 text-sm font-semibold transition-all duration-300 border border-white/10">
            <i class="fa-solid fa-magnifying-glass text-sm"></i>
            Search Rental
          </button>

        </div>


      </form>

    </div>

  </div>

</section>

<script>

  let currentTab = "buy";

  function switchTab(type,btn){

    if(currentTab === type) return;

    currentTab = type;

    document.querySelectorAll(".tab-btn").forEach(button=>{
      button.classList.remove("active");
      button.classList.add("text-white");
    });

    btn.classList.add("active");
    btn.classList.remove("text-white");

    const buyForm = document.getElementById("buyForm");
    const rentForm = document.getElementById("rentForm");

    if(type === "rent"){

      buyForm.classList.add("hidden");
      rentForm.classList.remove("hidden");
      rentForm.classList.add("grid");

    }else{

      rentForm.classList.add("hidden");
      buyForm.classList.remove("hidden");
      buyForm.classList.add("grid");

    }

  }

</script>
